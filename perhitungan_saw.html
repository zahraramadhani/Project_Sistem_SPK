<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perhitungan SAW - SPK Kost</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="main-content">
        <div class="row">
            <div class="col-md-12">
                <h2 class="mb-4 text-center">Proses Perhitungan SAW</h2>
                
                <!-- Step 1: Matrix X -->
                <div class="glass-card">
                    <h4>1. Matriks Keputusan (X)</h4>
                    <div class="table-responsive">
                        <table class="table table-bordered text-center">
                            <thead class="table-light">
                                <tr id="header-x"></tr>
                            </thead>
                            <tbody id="body-x"></tbody>
                        </table>
                    </div>
                </div>

                <!-- Step 2: Normalization (R) -->
                <div class="glass-card">
                    <h4>2. Matriks Ternormalisasi (R)</h4>
                    <div class="table-responsive">
                        <table class="table table-bordered text-center">
                            <thead class="table-light">
                                <tr id="header-r"></tr>
                            </thead>
                            <tbody id="body-r"></tbody>
                        </table>
                    </div>
                </div>

                <!-- Step 3: Ranking -->
                <div class="glass-card">
                    <h4>3. Hasil Akhir & Perankingan (SAW)</h4>
                    <div class="table-responsive">
                        <table class="table table-hover text-center">
                            <thead class="bg-pink text-white">
                                <tr>
                                    <th>Peringkat</th>
                                    <th>Nama Alternatif</th>
                                    <th>Nilai Preferensi (V)</th>
                                </tr>
                            </thead>
                            <tbody id="body-rank"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="assets/js/data.js"></script>
    <script src="assets/js/layout.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const result = calculateSAW();
            const criteria = DB.getKriteria();
            const alternatif = DB.getAlternatif();

            // Render Matrix X
            const headerX = document.getElementById('header-x');
            headerX.innerHTML = '<th>Alternatif</th>' + criteria.map(k => `<th>${k.kode}</th>`).join('');
            
            const bodyX = document.getElementById('body-x');
            alternatif.forEach(a => {
                let row = `<tr><td class="text-start"><strong>${a.nama}</strong></td>`;
                criteria.forEach(k => {
                    row += `<td>${result.matrix_x[a.id][k.id] || 0}</td>`;
                });
                row += '</tr>';
                bodyX.innerHTML += row;
            });

            // Render Matrix R
            const headerR = document.getElementById('header-r');
            headerR.innerHTML = '<th>Alternatif</th>' + criteria.map(k => `<th>${k.kode}</th>`).join('');
            
            const bodyR = document.getElementById('body-r');
            alternatif.forEach(a => {
                let row = `<tr><td class="text-start"><strong>${a.nama}</strong></td>`;
                criteria.forEach(k => {
                    const val = result.matrix_r[a.id][k.id] || 0;
                    row += `<td>${val.toFixed(3)}</td>`;
                });
                row += '</tr>';
                bodyR.innerHTML += row;
            });

            // Render Ranks
            const bodyRank = document.getElementById('body-rank');
            result.ranks.forEach((r, index) => {
                bodyRank.innerHTML += `
                    <tr>
                        <td><span class="badge rounded-pill bg-pink px-3">${index + 1}</span></td>
                        <td><strong>${r.nama}</strong></td>
                        <td class="text-primary-pink fw-bold">${r.value.toFixed(4)}</td>
                    </tr>
                `;
            });
        });
    </script>
</body>
</html>
