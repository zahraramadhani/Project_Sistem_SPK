<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Alternatif - SPK Kost</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="main-content">
        <div class="row">
            <div class="col-md-12">
                <div class="glass-card">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h2><i class="fas fa-users me-2"></i>Daftar Alternatif & Penilaian</h2>
                        <button class="btn btn-pink" data-bs-toggle="modal" data-bs-target="#addModal">
                            <i class="fas fa-plus me-1"></i> Tambah Alternatif
                        </button>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-bordered table-hover">
                            <thead class="table-light text-center">
                                <tr id="table-header">
                                    <th>No</th>
                                    <th>Nama Kost</th>
                                    <!-- Criteria columns will be injected -->
                                    <th width="100">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="alternatif-list">
                                <!-- Data injected here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Modal -->
    <div class="modal fade" id="addModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-pink text-white">
                    <h5 class="modal-title">Tambah Alternatif & Penilaian</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <form id="add-form">
                    <div class="modal-body">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Nama Kost</label>
                                <input type="text" name="nama" class="form-control" required placeholder="Contoh: Kost Mawar">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Alamat</label>
                                <input type="text" name="alamat" class="form-control" required placeholder="Jl. Raya No. 123">
                            </div>
                        </div>
                        <hr>
                        <h5>Input Nilai Kriteria</h5>
                        <div id="criteria-inputs" class="row">
                            <!-- Criteria inputs injected here -->
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                        <button type="submit" class="btn btn-pink">Simpan</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="assets/js/data.js"></script>
    <script src="assets/js/layout.js"></script>
    <script>
        const criteria = DB.getKriteria();

        function renderHeader() {
            const header = document.getElementById('table-header');
            header.innerHTML = `<th>No</th><th>Nama Kost</th>`;
            criteria.forEach(k => {
                header.innerHTML += `<th title="${k.nama}">${k.kode}</th>`;
            });
            header.innerHTML += `<th>Aksi</th>`;
        }

        function renderInputs() {
            const container = document.getElementById('criteria-inputs');
            container.innerHTML = '';
            criteria.forEach(k => {
                container.innerHTML += `
                    <div class="col-md-4 mb-3">
                        <label class="form-label">${k.kode} - ${k.nama}</label>
                        <input type="number" name="crit_${k.id}" class="form-control" step="any" required>
                    </div>
                `;
            });
        }

        function renderAlternatif() {
            const alternatif = DB.getAlternatif();
            const penilaian = DB.getPenilaian();
            const tbody = document.getElementById('alternatif-list');
            tbody.innerHTML = '';

            alternatif.forEach((a, index) => {
                let row = `
                    <tr>
                        <td class="text-center">${index + 1}</td>
                        <td>
                            <strong>${a.nama}</strong><br>
                            <small class="text-muted">${a.alamat}</small>
                        </td>
                `;

                criteria.forEach(k => {
                    const p = penilaian.find(item => item.id_alternatif === a.id && item.id_kriteria === k.id);
                    row += `<td class="text-center">${p ? p.nilai : '-'}</td>`;
                });

                row += `
                        <td class="text-center">
                            <button class="btn btn-sm btn-danger" onclick="deleteAlternatif(${a.id})">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });
        }

        document.getElementById('add-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const altList = DB.getAlternatif();
            const penList = DB.getPenilaian();
            
            const altId = Date.now();
            const newAlt = {
                id: altId,
                nama: formData.get('nama'),
                alamat: formData.get('alamat')
            };

            altList.push(newAlt);
            
            criteria.forEach(k => {
                penList.push({
                    id_alternatif: altId,
                    id_kriteria: k.id,
                    nilai: parseFloat(formData.get(`crit_${k.id}`))
                });
            });

            DB.setAlternatif(altList);
            DB.setPenilaian(penList);
            
            bootstrap.Modal.getInstance(document.getElementById('addModal')).hide();
            this.reset();
            renderAlternatif();
        });

        window.deleteAlternatif = (id) => {
            if (confirm('Yakin ingin menghapus alternatif ini?')) {
                const altList = DB.getAlternatif().filter(a => a.id !== id);
                const penList = DB.getPenilaian().filter(p => p.id_alternatif !== id);
                DB.setAlternatif(altList);
                DB.setPenilaian(penList);
                renderAlternatif();
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            renderHeader();
            renderInputs();
            renderAlternatif();
        });
    </script>
</body>
</html>
