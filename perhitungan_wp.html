<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perhitungan WP - SPK Kost</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="main-content">
        <div class="row">
            <div class="col-md-12">
                <h2 class="mb-4 text-center">Proses Perhitungan Weighted Product (WP)</h2>
                
                <!-- Step 1: Weight Normalization -->
                <div class="glass-card">
                    <h4>1. Perbaikan Bobot (W)</h4>
                    <div class="table-responsive">
                        <table class="table table-bordered text-center">
                            <thead class="table-light">
                                <tr>
                                    <th>Kriteria</th>
                                    <th>Bobot Awal</th>
                                    <th>Tipe</th>
                                    <th>Perbaikan Bobot (wj)</th>
                                </tr>
                            </thead>
                            <tbody id="body-w"></tbody>
                        </table>
                    </div>
                </div>

                <!-- Step 2: Vector S -->
                <div class="glass-card">
                    <h4>2. Perhitungan Nilai Vektor S</h4>
                    <div class="table-responsive">
                        <table class="table table-bordered text-center">
                            <thead class="table-light">
                                <tr>
                                    <th>Alternatif</th>
                                    <th>Perhitungan</th>
                                    <th>Nilai S</th>
                                </tr>
                            </thead>
                            <tbody id="body-s"></tbody>
                            <tfoot>
                                <tr class="table-pink fw-bold">
                                    <td colspan="2">Total Nilai S</td>
                                    <td id="total-s"></td>
                                </tr>
                            </tfoot>
                        </table>
                    </div>
                </div>

                <!-- Step 3: Vector V & Ranking -->
                <div class="glass-card">
                    <h4>3. Hasil Akhir & Perankingan (WP)</h4>
                    <div class="table-responsive">
                        <table class="table table-hover text-center">
                            <thead class="bg-pink text-white">
                                <tr>
                                    <th>Peringkat</th>
                                    <th>Nama Alternatif</th>
                                    <th>Nilai Vektor V</th>
                                </tr>
                            </thead>
                            <tbody id="body-v"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="assets/js/data.js"></script>
    <script src="assets/js/layout.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const result = calculateWP();
            const criteria = DB.getKriteria();

            // Render Weights
            const bodyW = document.getElementById('body-w');
            result.kriteria_weights.forEach(k => {
                bodyW.innerHTML += `
                    <tr>
                        <td><strong>${k.kode} - ${k.nama}</strong></td>
                        <td>${k.bobot}</td>
                        <td>${k.type}</td>
                        <td class="fw-bold">${k.w.toFixed(4)}</td>
                    </tr>
                `;
            });

            // Render Vector S
            const bodyS = document.getElementById('body-s');
            result.matrix_s.forEach(s => {
                let calcStr = criteria.map(k => {
                    const val = result.matrix_x[s.id][k.id] || 0;
                    const w = result.kriteria_weights.find(kw => kw.id === k.id).w;
                    return `(${val}^${w.toFixed(2)})`;
                }).join(' * ');

                bodyS.innerHTML += `
                    <tr>
                        <td class="text-start"><strong>${s.nama}</strong></td>
                        <td class="small text-muted">${calcStr}</td>
                        <td class="fw-bold text-pink">${s.s.toExponential(4)}</td>
                    </tr>
                `;
            });
            document.getElementById('total-s').innerText = result.total_s.toExponential(4);

            // Render Vector V & Ranking
            const bodyV = document.getElementById('body-v');
            result.ranks.forEach((r, index) => {
                bodyV.innerHTML += `
                    <tr>
                        <td><span class="badge rounded-pill bg-pink px-3">${index + 1}</span></td>
                        <td><strong>${r.nama}</strong></td>
                        <td class="text-primary-pink fw-bold">${r.v.toFixed(4)}</td>
                    </tr>
                `;
            });
        });
    </script>
</body>
</html>
